providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "gcc"]

[phases.install]
cmds = [
  "python -m venv /app/.venv",
  "/app/.venv/bin/python -m pip install --upgrade pip",
  "/app/.venv/bin/python -m pip install -r backend/requirements.txt"
]

[start]
cmd = "/app/.venv/bin/python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
