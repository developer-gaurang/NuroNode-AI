<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" style="background: transparent;">
  <style>
    @keyframes blink {
      0%, 90%, 100% {
        transform: scaleY(1);
      }
      93%, 95% {
        transform: scaleY(0.05);
      }
    }
    @keyframes spin-clockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-counter {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .hud-ring-1 {
      transform-origin: 100px 100px;
      animation: spin-clockwise 20s infinite linear;
      stroke: #06b6d4;
    }
    .hud-ring-2 {
      transform-origin: 100px 100px;
      animation: spin-counter 15s infinite linear;
      stroke: #ec4899;
      stroke-dasharray: 10 40 80 40;
    }
    .hud-ring-3 {
      transform-origin: 100px 100px;
      animation: pulse-glow 3s infinite ease-in-out;
      stroke: #3b82f6;
    }
    .eye-group {
      transform-origin: 100px 100px;
      animation: blink 3.5s infinite ease-in-out;
    }
    .iris {
      fill: url(#iris-grad);
    }
    .pupil-glow {
      fill: #00f0ff;
      filter: drop-shadow(0px 0px 8px #00f0ff);
    }
  </style>
  <defs>
    <radialGradient id="iris-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="60%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <linearGradient id="hud-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Outer HUD Circles (Not blinking) -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#hud-grad)" stroke-width="1.5" stroke-dasharray="5 15" class="hud-ring-1" />
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#hud-grad)" stroke-width="1" class="hud-ring-3" style="stroke-width: 0.5px;" />
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ec4899" stroke-width="2" class="hud-ring-2" />

  <!-- Grid Lines (Futuristic Crosshairs) -->
  <line x1="100" y1="5" x2="100" y2="25" stroke="#06b6d4" stroke-width="1.5" opacity="0.7" />
  <line x1="100" y1="175" x2="100" y2="195" stroke="#06b6d4" stroke-width="1.5" opacity="0.7" />
  <line x1="5" y1="100" x2="25" y2="100" stroke="#06b6d4" stroke-width="1.5" opacity="0.7" />
  <line x1="175" y1="100" x2="195" y2="100" stroke="#06b6d4" stroke-width="1.5" opacity="0.7" />

  <!-- Blinking Cybernetic Eye -->
  <g class="eye-group">
    <!-- Eyelid Outlines / Eye Shape -->
    <path d="M 40 100 Q 100 45 160 100 Q 100 155 40 100 Z" fill="#0f172a" stroke="#06b6d4" stroke-width="3.5" />
    
    <!-- Outer Iris Ring -->
    <circle cx="100" cy="100" r="32" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="10 6" />

    <!-- Iris -->
    <circle cx="100" cy="100" r="28" class="iris" />

    <!-- Pupil -->
    <circle cx="100" cy="100" r="12" fill="#0f172a" stroke="#00f0ff" stroke-width="1" />
    
    <!-- Cybernetic pupil design -->
    <line x1="88" y1="100" x2="112" y2="100" stroke="#00f0ff" stroke-width="1.5" />
    <line x1="100" y1="88" x2="100" y2="112" stroke="#00f0ff" stroke-width="1.5" />
    
    <!-- Center core glow -->
    <circle cx="100" cy="100" r="4" fill="#ffffff" class="pupil-glow" />
    
    <!-- Reflection/Tech Glare -->
    <circle cx="92" cy="92" r="3.5" fill="#ffffff" opacity="0.8" />
    <circle cx="86" cy="94" r="1.5" fill="#ffffff" opacity="0.5" />
  </g>
</svg>
